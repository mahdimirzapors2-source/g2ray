name: "VPN"
on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build everything
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta name="viewport" content="width=device-width,initial-scale=1"><title>VPN</title>
          <style>body{background:#0d1117;color:#fff;font-family:system-ui;padding:16px}input,button{padding:12px;margin:5px;border-radius:8px}input{flex:1;background:#1f242f;border:1px solid #3d444d;color:#fff}button{background:#238636;border:none;color:#fff;font-weight:bold}.url-bar{display:flex}.content{background:#161b22;border-radius:16px;padding:16px;margin-top:16px;min-height:400px}.status{position:fixed;bottom:10px;left:10px;right:10px;background:rgba(0,0,0,0.8);padding:8px;border-radius:20px;font-size:11px;text-align:center}iframe,img,video{max-width:100%;border-radius:12px}iframe{width:100%;min-height:400px;border:none}</style>
          </head>
          <body>
          <div class="url-bar"><input id="url" placeholder="https://google.com" value="https://google.com"><button id="go">🌐</button></div>
          <div class="content" id="content"></div>
          <div class="status" id="status">🟢 آماده</div>
          <script>
            const REPO = window.location.hostname === 'localhost' ? 'demo/repo' : window.location.pathname.split('/')[1] + '/' + window.location.pathname.split('/')[2];
            async function fetchPage(url){
              document.getElementById('status').innerHTML='⏳ ارسال...';
              document.getElementById('content').innerHTML='';
              try{
                const req={status:'pending',request:{url:url,method:'GET'}};
                await fetch(`https://api.github.com/repos/${REPO}/contents/req.json`,{method:'PUT',headers:{'Authorization':'token ${{ secrets.GITHUB_TOKEN }}','Content-Type':'application/json'},body:JSON.stringify({message:'req',content:btoa(JSON.stringify(req))})});
                for(let i=0;i<60;i++){
                  const res=await fetch(`https://raw.githubusercontent.com/${REPO}/main/res.json?t=${Date.now()}`);
                  const data=await res.json();
                  if(data.status==='done'){
                    const bytes=Uint8Array.from(atob(data.body),c=>c.charCodeAt(0));
                    const blob=new Blob([bytes],{type:data.type});
                    const blobUrl=URL.createObjectURL(blob);
                    if(data.type.includes('html')) document.getElementById('content').innerHTML=`<iframe srcdoc="${escapeHtml(new TextDecoder().decode(bytes))}"></iframe>`;
                    else if(data.type.includes('video')) document.getElementById('content').innerHTML=`<video controls autoplay src="${blobUrl}"></video>`;
                    else document.getElementById('content').innerHTML=`<pre>${escapeHtml(new TextDecoder().decode(bytes))}</pre>`;
                    document.getElementById('status').innerHTML='✅ دریافت شد';
                    return;
                  }
                  await new Promise(r=>setTimeout(r,1000));
                }
                throw new Error('Timeout');
              }catch(e){document.getElementById('status').innerHTML='❌ '+e.message;}
            }
            function escapeHtml(s){return s.replace(/[&<>]/g,function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';});}
            document.getElementById('go').onclick=()=>fetchPage(document.getElementById('url').value);
            fetchPage('https://google.com');
          </script>
          </body>
          </html>
          EOF
          
          cat > server.js << 'EOF'
          const fs=require('fs'),{execSync}=require('child_process'),http=require('http'),https=require('https'),url=require('url');
          const reqFile='req.json',resFile='res.json';
          function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
          async function loop(){
            while(true){
              try{
                let req=null;
                try{req=JSON.parse(fs.readFileSync(reqFile));}catch(e){}
                if(req&&req.status==='pending'){
                  console.log('📤',req.request.url);
                  const parsed=url.parse(req.request.url);
                  const p=parsed.protocol==='https:'?https:http;
                  const response=await new Promise(r=>{
                    p.request({hostname:parsed.hostname,port:parsed.port||(parsed.protocol==='https:'?443:80),path:parsed.path,method:'GET'},res=>{
                      const chunks=[];
                      res.on('data',c=>chunks.push(c));
                      res.on('end',()=>r({body:Buffer.concat(chunks).toString('base64'),type:res.headers['content-type']||'text/plain'}));
                    }).end();
                  });
                  fs.writeFileSync(resFile,JSON.stringify({status:'done',body:response.body,type:response.type}));
                  execSync(`git add ${resFile} && git commit -m res --allow-empty && git push`,{stdio:'pipe'});
                  fs.writeFileSync(reqFile,JSON.stringify({status:'waiting'}));
                  execSync(`git add ${reqFile} && git commit -m req --allow-empty && git push`,{stdio:'pipe'});
                  console.log('📥 Done');
                }
              }catch(e){console.log(e.message);}
              await sleep(1000);
            }
          }
          loop();
          EOF
          
          git config user.name "bot"
          git config user.email "bot@local"
          echo '{"status":"waiting"}' > req.json
          echo '{"status":"waiting"}' > res.json
          git add . && git commit -m "init" && git push
          node server.js
